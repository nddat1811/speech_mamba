audionet:
  audionet_config:
    activation: prelu
    attn_approx_qk_dim: 512
    attn_n_head: 4
    emb_dim: 16
    emb_hs: 1
    emb_ks: 8
    eps: 1.0e-05
    input_dim: 64
    lstm_hidden_units: 256
    n_fft: 256
    n_imics: 1
    n_layers: 6
    n_srcs: 2
    stride: 64
    use_builtin_complex: false
    window: hann
  audionet_name: SPMamba
datamodule:
  data_config:
    batch_size: 1
    n_src: 2
    normalize_audio: false
    num_workers: 8
    persistent_workers: false
    pin_memory: true
    sample_rate: 16000
    segment: 3.0
    test_dir: /mnt/c/Users/tun/Desktop/code/speech_separation/dataset/Libri2Mix/wav16k/min/test
    train_dir: /mnt/c/Users/tun/Desktop/code/speech_separation/dataset/Libri2Mix/wav16k/min/train-100
    valid_dir: /mnt/c/Users/tun/Desktop/code/speech_separation/dataset/Libri2Mix/wav16k/min/test
  data_name: Libri2MixDataModule
exp:
  exp_name: SPMamba-Libri2Mix
loss:
  train:
    config:
      pit_from: pw_mtx
      threshold_byloss: false
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_snr
  val:
    config:
      pit_from: pw_mtx
      threshold_byloss: false
    loss_func: PITLossWrapper
    sdr_type: pairwise_neg_sisdr
main_args:
  conf_dir: configs/spmamba-librimix.yml
  exp_dir: /home/tun/speech_mamba/Experiments/checkpoint/SPMamba-Libri2Mix
  help: null
optimizer:
  lr: 0.001
  optim_name: adam
  weight_decay: 0
positional arguments: {}
scheduler:
  sche_config:
    factor: 0.5
    patience: 10
  sche_name: ReduceLROnPlateau
training:
  SpeedAug: false
  early_stop:
    mode: min
    monitor: val_loss/dataloader_idx_0
    patience: 20
    verbose: true
  epochs: 500
  gpus:
  - 0
  parallel: ddp
  system: AudioLightningModule
